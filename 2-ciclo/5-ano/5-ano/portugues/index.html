<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>PT - Português | 5.º Ano</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
text-align:center;
margin:0;
}

header{
background:#4CAF50;
color:white;
padding:30px;
}

section{
padding:40px;
}

.lista{
max-width:600px;
margin:auto;
}

.ficha{
display:block;
background:white;
padding:15px;
margin:10px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-decoration:none;
color:#333;
font-weight:bold;
}

.voltar{
display:inline-block;
margin-top:20px;
padding:10px 18px;
background:#4CAF50;
color:white;
border-radius:8px;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<h1>PT - Português</h1>
<p>5.º Ano — Fichas de estudo</p>
</header>

<section>

<div class="lista" id="lista-fichas"></div>

<a href="../index.html" class="voltar">⬅ Voltar ao 5.º Ano</a>

</section>

<script>

/* lista de fichas na pasta */
const fichas = [
"fichas/gramatica-1.pdf",
"fichas/gramatica-2.pdf"
];

const lista = document.getElementById("lista-fichas");

fichas.forEach(ficha => {

let nome = ficha.split("/").pop().replace(".pdf","").replaceAll("-"," ");

let link = document.createElement("a");
link.href = ficha;
link.target = "_blank";
link.className = "ficha";
link.textContent = "⬇ " + nome;

lista.appendChild(link);

});

</script>

</body>
</html>
